[package]
name = "pipe-bolt"
version = "1.0.0"
edition = "2024"

[dependencies]
rumqttc = "0.25.1"
tokio = { version = "1.52.3", features = ["full"] }
salvo = { version = "0.93.0", features = ["affix-state", "sse", "websocket"] }
bytes = "1.11.1"
serde = { version = "1.0.228", features = ["default", "derive"] }
serde_json = "1.0.150"
async-stream = "0.3.6"
base64 = "0.22.1"
futures-util = "0.3.32"